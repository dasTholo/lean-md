name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4 # v4
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      # .cargo/config.toml + rust-toolchain.toml are dev-only accelerators (mold,
      # Cranelift, nightly). stable cargo errors parsing [profile.dev] even for
      # --release, so remove them on EVERY leg. windows-latest has git-bash →
      # shell: bash carries everywhere. The checkout is ephemeral.
      - name: Neutralize dev-only cargo config for a portable release
        shell: bash
        run: rm -f .cargo/config.toml rust-toolchain.toml
      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build (CLI-only, default features — stable, default linker)
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package (Unix — bare binary, no archive)
        if: runner.os != 'Windows'
        shell: bash
        run: cp target/${{ matrix.target }}/release/lean-md lean-md-${{ matrix.target }}
      - name: Package (Windows — bare .exe, no archive)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/lean-md.exe lean-md-${{ matrix.target }}.exe
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: lean-md-${{ matrix.target }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
      - name: Generate checksums (bare binaries)
        run: sha256sum lean-md-* > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            lean-md-*
            SHA256SUMS

  sync-manifest:
    name: Sync [artifacts] url + sha256 into lean-ctx-addon.toml
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # v4
        with:
          ref: feat-lmd-v2
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${GITHUB_REF_NAME}" --pattern SHA256SUMS --dir .
      - name: Patch [artifacts] url + sha256 (all triples)
        run: |
          python3 - <<'PY'
          import os, re
          tag = os.environ["GITHUB_REF_NAME"]
          path = "lean-ctx-addon.toml"
          src = open(path).read()
          expected = set(re.findall(r'\[artifacts\.([^\]]+)\]', src))
          # Pin every artifact download to the tag that triggered this run, so the
          # url version can never drift from the synced sha256 again (0.2.1 shipped
          # a v0.2.0 url against a v0.2.1 hash because only the hash was patched).
          patched = re.sub(
              r'(/releases/download/)[^/]+(/lean-md-)',
              lambda m: m.group(1) + tag + m.group(2),
              src)
          seen = set()
          for line in open("SHA256SUMS"):
              line = line.strip()
              if not line:
                  continue
              parts = line.split()
              sha, asset = parts[0], parts[-1].lstrip("*")
              triple = asset[len("lean-md-"):]
              if triple.endswith(".exe"):
                  triple = triple[: -len(".exe")]
              patched, n = re.subn(
                  r'(\[artifacts\.' + re.escape(triple) + r'\][^\[]*?sha256\s*=\s*")[0-9a-f]{64}(")',
                  lambda m: m.group(1) + sha + m.group(2),
                  patched, flags=re.S)
              if n != 1:
                  raise SystemExit(f"block [artifacts.{triple}] not patched (matched {n})")
              seen.add(triple)
          missing = expected - seen
          if missing:
              raise SystemExit(f"no SHA256SUMS entry for: {sorted(missing)}")
          open(path, "w").write(patched)
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lean-ctx-addon.toml
          git diff --cached --quiet || git commit -m "chore(release): sync [artifacts] url + sha256 for ${GITHUB_REF_NAME}"
          git push
