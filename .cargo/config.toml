# Fast dev builds: Cranelift codegen backend + mold linker via clang.
# Requires nightly (codegen-backend is unstable) — see rust-toolchain.toml.
# jobs matches the 24 hardware threads of this machine.
[build]
jobs = 24

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[unstable]
codegen-backend = true

[profile.dev]
opt-level = 0
incremental = true
codegen-backend = "cranelift"
# line-tables-only keeps backtraces/line numbers but skips full debuginfo
# (variable/type info) → ~20-40% faster dev/test builds. Debugger rarely used.
debug = "line-tables-only"
