[addon]
name = "lean-md"
display_name = "lean-md"
version = "0.2.1"
description = "Macro/directive markdown renderer for lean-ctx context engineering."
author = "dasTholo"
homepage = "https://github.com/dasTholo/lean-md"
license = "Apache-2.0"
categories = ["workflow"]
keywords = ["markdown", "macros", "dispatch", "skills"]
min_lean_ctx = "3.9.6"
# E4 (Rev3): 3.9.6 = erste released Version mit dem #727-Vertrag (= #780); 3.9.5
#            trägt ihn nicht. Der Wert dokumentiert den Vertrag. Per Rev2-D6 schützt
#            das Preflight-Gate strukturell nicht gegen ≤ die einführende Version —
#            das lokale 3.9.6-Binary passiert im Gleichstand; realer Schutz gegen
#            stillen Leerlauf bleibt der harte PACK_MISSING im Renderer.
# verified: do NOT set — it is registry-controlled and meaningless in a
#           hand-written manifest. Trust is conferred by the registry, not the entry.

[artifacts.x86_64-unknown-linux-gnu]
filename = "lean-md-x86_64-unknown-linux-gnu"
url      = "https://github.com/dasTholo/lean-md/releases/download/v0.2.2/lean-md-x86_64-unknown-linux-gnu"
sha256   = "1dc998ea03146b208d9a846eb4c80825daddbce34d446b7d48e1d5deef80461d"

[artifacts.aarch64-unknown-linux-gnu]
filename = "lean-md-aarch64-unknown-linux-gnu"
url      = "https://github.com/dasTholo/lean-md/releases/download/v0.2.2/lean-md-aarch64-unknown-linux-gnu"
sha256   = "2f0a4a16098d06ec04e0f83f2443fb6cfb236e510dd71ace0510e10461d4c004"

[artifacts.x86_64-apple-darwin]
filename = "lean-md-x86_64-apple-darwin"
url      = "https://github.com/dasTholo/lean-md/releases/download/v0.2.2/lean-md-x86_64-apple-darwin"
sha256   = "ef6d82f30166c6fd18c50f3e9f9cbcf84f6f1171b9e012c33aa82dd0d58a8c9f"

[artifacts.aarch64-apple-darwin]
filename = "lean-md-aarch64-apple-darwin"
url      = "https://github.com/dasTholo/lean-md/releases/download/v0.2.2/lean-md-aarch64-apple-darwin"
sha256   = "bb46c3f44a0677efb32991879be5edc25ea07e2b1634794c6930f379434e1770"

[artifacts.x86_64-pc-windows-msvc]
filename = "lean-md-x86_64-pc-windows-msvc.exe"
url      = "https://github.com/dasTholo/lean-md/releases/download/v0.2.2/lean-md-x86_64-pc-windows-msvc.exe"
sha256   = "8909151364ac4c50edc0d3e29786d7b032c03e92c2a82c46f17b217da5e55afb"

# Skill-Content lebt seit P3 (#727) im Pack, nicht im Binary. Der Resolver löst
# `version_req` depth-1 gegen den Registry-Index auf; ein Pack, das nur als
# GitHub-Asset existiert, ist für ihn unsichtbar → hosted publish ist Pflicht.
[[dependencies]]
name        = "@dastholo/lean-md-skills"
version_req = "^0.2"
optional    = false

[mcp]
transport = "stdio"
command = "lean-md"
args = ["mcp"]

# lean-ctx expandiert den Platzhalter beim Wiring zum absoluten `skills_dir` des
# materialisierten Packs (core/addons/pack_env.rs). Ein `{` ohne `}` oder ein
# unbekanntes Schema ist ein harter Parse-Fehler — kein Literal-Escape existiert.
[mcp.env]
LEAN_MD_SKILLS_DIR = "{pack_dir:@dastholo/lean-md-skills}"
# sha256: leave empty for community; for the verified/paid tier set the binary pin
#         (`shasum -a 256 lean-md` → hex). The gateway refuses to spawn on mismatch.

# [capabilities] (588799d): lean-md is a callback addon — P2-Task6 routes EVERY
# code-intel directive outbound via backend.call("ctx_*"), i.e. it spawns lean-ctx
# at runtime. Declaring the capabilities keeps the audit honest and shows the user
# the full capability set (including exec) in the install consent.
[capabilities]
network = "none"          # local code-intel needs no network
filesystem = "read_write" # the spawned lean-ctx writes its session cache
exec = ["lean-ctx"]       # may spawn exactly lean-ctx (declared+audited, not OS-enforced — 9fbe855e)
